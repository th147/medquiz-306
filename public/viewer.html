<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>笔记查看</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#2c2c2c;color:#eee;min-height:100vh;display:flex;flex-direction:column}
/* ── Toolbar ── */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:#1a1a1a;flex-shrink:0;position:sticky;top:0;z-index:10;
  border-bottom:1px solid #333;
}
.toolbar .title{font-size:14px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin:0 10px}
.toolbar .btn{background:none;border:none;color:#aaa;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px;line-height:1;font-family:inherit}
.toolbar .btn:hover{background:#333;color:#fff}
/* ── Content ── */
.content{flex:1;overflow-y:auto;padding:8px 0;text-align:center}
.content img{max-width:100%;height:auto;display:block;margin:4px auto;box-shadow:0 2px 12px rgba(0,0,0,.5)}
/* ── Loading ── */
.loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:300px;gap:12px;color:#888;font-size:14px;
}
.loading .spinner{
  width:32px;height:32px;border:3px solid rgba(255,255,255,.15);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── Controls ── */
.controls{
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding:10px 0 16px;flex-shrink:0;
}
.controls button{
  background:rgba(255,255,255,.12);color:#fff;border:none;
  padding:8px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;
  transition:background .2s;
}
.controls button:active{background:rgba(255,255,255,.2)}
.controls button:disabled{opacity:.3;pointer-events:none}
.controls .page-info{color:#aaa;font-size:13px;min-width:40px;text-align:center}
/* ── Error ── */
.error{text-align:center;padding:60px 20px;color:#aaa;font-size:14px}
.error p:first-child{color:#f66;font-size:18px;margin-bottom:8px}
</style>
</head>
<body>
<div class="toolbar">
  <span class="title" id="viewerTitle">笔记预览</span>
  <button class="btn" onclick="window.close()" title="关闭">&times;</button>
</div>
<div class="content" id="content">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>加载中...</span>
  </div>
</div>
<div class="controls" id="controls" style="display:none">
  <button onclick="prevPage()" id="prevBtn">上一页</button>
  <span class="page-info" id="pageInfo">1/1</span>
  <button onclick="nextPage()" id="nextBtn">下一页</button>
</div>

<script>
const params = new URLSearchParams(location.search);
const noteId = params.get('id');
const token = params.get('token');
const ext = (params.get('name') || '').split('.').pop().toLowerCase();

let currentPage = 1;
let totalPages = 1;

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').innerHTML = '<div class="error"><p>加载失败</p><p>'+msg+'</p></div>';
}

async function init() {
  if (!noteId || !token) return showError('缺少参数');

  // PDF: server-side PNG images
  if (ext === 'pdf') {
    try {
      const countResp = await fetch('/api/notes/' + noteId + '/pages/count?token=' + token);
      const countData = await countResp.json();
      totalPages = countData.pages || 1;
      document.getElementById('controls').style.display = totalPages > 1 ? 'flex' : 'none';
      document.getElementById('pageInfo').textContent = '1/' + totalPages;
      await loadPage(1);
      document.getElementById('loading').style.display = 'none';
    } catch(e) {
      showError(e.message || '网络错误');
    }
    return;
  }

  // Images
  if (['png','jpg','jpeg','gif','webp'].includes(ext)) {
    try {
      const resp = await fetch('/api/notes/' + noteId + '/view?token=' + token);
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const img = document.createElement('img');
      img.src = url;
      img.onload = () => { document.getElementById('loading').style.display = 'none'; };
      document.getElementById('content').appendChild(img);
    } catch(e) {
      showError(e.message);
    }
    return;
  }

  // Text
  if (['txt','md'].includes(ext)) {
    try {
      const resp = await fetch('/api/notes/' + noteId + '/view?token=' + token);
      const text = await resp.text();
      const pre = document.createElement('pre');
      pre.style.cssText = 'text-align:left;padding:20px;line-height:1.8;white-space:pre-wrap;word-break:break-word;font-size:15px;color:#ddd;max-width:800px;margin:0 auto;font-family:system-ui,sans-serif';
      pre.textContent = text;
      document.getElementById('content').appendChild(pre);
      document.getElementById('loading').style.display = 'none';
    } catch(e) {
      showError(e.message);
    }
    return;
  }

  // Word: Google Docs Viewer
  if (['doc','docx'].includes(ext)) {
    window.location.href = '/api/notes/' + noteId + '/view?token=' + token;
    return;
  }

  showError('不支持的文件格式');
}

async function loadPage(pageNum) {
  const img = document.createElement('img');
  img.src = '/api/notes/' + noteId + '/pages/' + pageNum + '?token=' + token;
  img.alt = '第 ' + pageNum + ' 页';
  const container = document.getElementById('content');
  // Remove previous images
  container.querySelectorAll('img').forEach(el => el.remove());
  container.appendChild(img);
  currentPage = pageNum;
  document.getElementById('pageInfo').textContent = pageNum + '/' + totalPages;
  document.getElementById('prevBtn').disabled = pageNum <= 1;
  document.getElementById('nextBtn').disabled = pageNum >= totalPages;
  window.scrollTo(0, 0);
}

function prevPage() {
  if (currentPage > 1) loadPage(currentPage - 1);
}
function nextPage() {
  if (currentPage < totalPages) loadPage(currentPage + 1);
}

init();
</script>
</body>
</html>
